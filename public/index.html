<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rain Market Creator - יוצר Markets</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      direction: rtl;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      background: rgba(255, 255, 255, 0.95);
      padding: 20px 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      color: #667eea;
      font-size: 2rem;
    }

    #connectBtn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }

    #connectBtn:hover {
      transform: scale(1.05);
    }

    #connectBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    h2 {
      color: #667eea;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }

    .wallet-info {
      background: #f7f7f7;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .wallet-label {
      font-weight: bold;
      color: #555;
      margin-bottom: 5px;
    }

    .wallet-address {
      font-family: monospace;
      color: #667eea;
      word-break: break-all;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .option-row input {
      flex: 1;
    }

    .btn-remove {
      background: #ff4757;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-remove:hover {
      background: #ff3838;
    }

    .btn-add {
      background: #2ecc71;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .btn-add:hover {
      background: #27ae60;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      transition: transform 0.2s;
    }

    .btn-primary:hover:not(:disabled) {
      transform: scale(1.02);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .markets-list {
      display: grid;
      gap: 15px;
      max-height: 600px;
      overflow-y: auto;
    }

    .market-item {
      background: #f7f7f7;
      padding: 15px;
      border-radius: 10px;
      border-right: 4px solid #667eea;
    }

    .market-title {
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }

    .market-stats {
      display: flex;
      gap: 20px;
      font-size: 0.9rem;
      color: #666;
    }

    .market-stat {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #999;
    }

    .stat-value {
      font-weight: bold;
      color: #667eea;
    }

    .status-connected {
      background: #2ecc71;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.9rem;
    }

    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      background: #ff4757;
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }

    .success {
      background: #2ecc71;
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }

    @media (max-width: 768px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      header {
        flex-direction: column;
        gap: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌧️ Rain Market Creator</h1>
      <button id="connectBtn">התחבר לארנק (MetaMask)</button>
    </header>

    <div id="connectedSection" style="display: none;">
      <div class="main-grid">
        <!-- Wallet Info Card -->
        <div class="card">
          <h2>💼 פרטי הארנק</h2>
          
          <div class="wallet-info">
            <div class="wallet-label">ארנק חיצוני (EOA):</div>
            <div class="wallet-address" id="externalAddress">מתחבר...</div>
          </div>

          <div class="wallet-info">
            <div class="wallet-label">ארנק פנימי (Rain Smart Account):</div>
            <div class="wallet-address" id="internalAddress">נגזר מה-EOA</div>
          </div>

          <div class="wallet-info">
            <div class="wallet-label">יתרת USDT:</div>
            <div class="wallet-address" id="usdtBalance">טוען...</div>
          </div>
        </div>

        <!-- Create Market Card -->
        <div class="card">
          <h2>➕ יצירת Market חדש</h2>
          
          <div class="form-group">
            <label>שאלת ה-Market:</label>
            <input type="text" id="marketQuestion" placeholder="האם ETH יגיע ל-$10k עד סוף 2026?" />
          </div>

          <div class="form-group">
            <label>אפשרויות (Options):</label>
            <div class="options-container" id="optionsContainer">
              <div class="option-row">
                <input type="text" value="כן" placeholder="אפשרות 1" />
                <button class="btn-remove" onclick="removeOption(this)">×</button>
              </div>
              <div class="option-row">
                <input type="text" value="לא" placeholder="אפשרות 2" />
                <button class="btn-remove" onclick="removeOption(this)">×</button>
              </div>
              <div class="option-row">
                <input type="text" value="לא סביר" placeholder="אפשרות 3" />
                <button class="btn-remove" onclick="removeOption(this)">×</button>
              </div>
            </div>
            <button class="btn-add" onclick="addOption()">+ הוסף אפשרות</button>
          </div>

          <div class="form-group">
            <label>סוג Market:</label>
            <select id="marketType">
              <option value="public">פובליק (Public)</option>
              <option value="private">פרטי (Private)</option>
            </select>
          </div>

          <div class="form-group">
            <label>נזילות ראשונית (USDT):</label>
            <input type="number" id="liquidityAmount" value="100" min="10" step="10" />
          </div>

          <div class="form-group">
            <label>תיאור:</label>
            <textarea id="marketDescription" placeholder="פרטים נוספים על ה-Market..."></textarea>
          </div>

          <button class="btn-primary" id="createMarketBtn" onclick="createMarket()">
            יצירת Market
          </button>

          <div id="createStatus"></div>
        </div>
      </div>

      <!-- Markets List -->
      <div class="card">
        <h2>📊 Markets פעילים</h2>
        <div id="marketsList" class="markets-list">
          <div class="loader"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentAccount = null;

    // Simple MetaMask connection
    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        alert('אנא התקן את MetaMask כדי להמשיך');
        return;
      }

      try {
        const accounts = await window.ethereum.request({ 
          method: 'eth_requestAccounts' 
        });
        
        currentAccount = accounts[0];
        
        // Check if on Arbitrum One (chain ID 42161)
        const chainId = await window.ethereum.request({ method: 'eth_chainId' });
        if (chainId !== '0xa4b1') {
          await window.ethereum.request({
            method: 'wallet_switchEthereumChain',
            params: [{ chainId: '0xa4b1' }], // Arbitrum One
          });
        }

        document.getElementById('connectedSection').style.display = 'block';
        document.getElementById('connectBtn').textContent = 'מחובר';
        document.getElementById('connectBtn').disabled = true;
        document.getElementById('externalAddress').textContent = currentAccount;
        
        await loadWalletInfo(currentAccount);
        await loadMarkets();
      } catch (error) {
        console.error('Connection error:', error);
        alert('שגיאה בהתחברות: ' + error.message);
      }
    }

    document.getElementById('connectBtn').onclick = connectWallet;

    // Listen for account changes
    if (window.ethereum) {
      window.ethereum.on('accountsChanged', (accounts) => {
        if (accounts.length > 0) {
          currentAccount = accounts[0];
          document.getElementById('externalAddress').textContent = currentAccount;
          loadWalletInfo(currentAccount);
        } else {
          location.reload();
        }
      });
    }

    async function loadWalletInfo(address) {
      try {
        // Load smart account address
        const smartAccRes = await fetch(`/api/smart-account/${address}`);
        const smartAccData = await smartAccRes.json();
        
        if (smartAccData.smartAccount) {
          document.getElementById('internalAddress').textContent = smartAccData.smartAccount;
        } else {
          document.getElementById('internalAddress').textContent = 'טרם נוצר (ייווצר בטרנזקציה הראשונה)';
        }
        
        // Load USDT balance
        const balanceRes = await fetch(`/api/balance/${address}`);
        const balances = await balanceRes.json();
        
        if (balances.length > 0) {
          document.getElementById('usdtBalance').textContent = `$${balances[0].balance.toFixed(2)}`;
        } else {
          document.getElementById('usdtBalance').textContent = '$0.00';
        }
      } catch (err) {
        console.error('Load wallet error:', err);
        document.getElementById('usdtBalance').textContent = 'שגיאה';
        document.getElementById('internalAddress').textContent = 'שגיאה בטעינה';
      }
    }

    async function loadMarkets() {
      try {
        const res = await fetch('/api/markets?limit=20&sortBy=Liquidity&status=Live');
        const markets = await res.json();
        
        const container = document.getElementById('marketsList');
        container.innerHTML = '';

        if (markets.length === 0) {
          container.innerHTML = '<p style="text-align:center;color:#999;">אין markets זמינים</p>';
          return;
        }

        markets.forEach(market => {
          const item = document.createElement('div');
          item.className = 'market-item';
          item.innerHTML = `
            <div class="market-title">${market.title || 'ללא כותרת'}</div>
            <div class="market-stats">
              <div class="market-stat">
                <span class="stat-label">נפח מסחר</span>
                <span class="stat-value">$${market.totalVolume.toFixed(2)}</span>
              </div>
              <div class="market-stat">
                <span class="stat-label">נזילות</span>
                <span class="stat-value">$${market.totalLiquidity.toFixed(2)}</span>
              </div>
              <div class="market-stat">
                <span class="stat-label">סטטוס</span>
                <span class="stat-value">${market.status}</span>
              </div>
            </div>
          `;
          container.appendChild(item);
        });
      } catch (err) {
        console.error('Load markets error:', err);
        document.getElementById('marketsList').innerHTML = '<p class="error">שגיאה בטעינת Markets</p>';
      }
    }

    function addOption() {
      const container = document.getElementById('optionsContainer');
      const row = document.createElement('div');
      row.className = 'option-row';
      row.innerHTML = `
        <input type="text" placeholder="אפשרות חדשה" />
        <button class="btn-remove" onclick="removeOption(this)">×</button>
      `;
      container.appendChild(row);
    }

    function removeOption(btn) {
      const container = document.getElementById('optionsContainer');
      if (container.children.length > 2) {
        btn.parentElement.remove();
      } else {
        alert('חייבות להיות לפחות 2 אפשרויות');
      }
    }

    async function createMarket() {
      const btn = document.getElementById('createMarketBtn');
      const status = document.getElementById('createStatus');
      
      try {
        btn.disabled = true;
        status.innerHTML = '<div class="loader"></div>';

        if (!currentAccount) {
          throw new Error('Wallet not connected');
        }

        const question = document.getElementById('marketQuestion').value.trim();
        const optionInputs = document.querySelectorAll('#optionsContainer input');
        const options = Array.from(optionInputs).map(i => i.value.trim()).filter(v => v);
        const isPublic = document.getElementById('marketType').value === 'public';
        const liquidity = parseFloat(document.getElementById('liquidityAmount').value);
        const description = document.getElementById('marketDescription').value.trim();

        if (!question) throw new Error('חובה להזין שאלה');
        if (options.length < 3) throw new Error('חייבות להיות לפחות 3 אפשרויות');
        if (liquidity < 10) throw new Error('נזילות מינימלית: 10 USDT');

        const now = Math.floor(Date.now() / 1000);
        const body = {
          marketQuestion: question,
          marketOptions: options,
          marketDescription: description,
          isPublic,
          creator: currentAccount,
          startTime: now + 300,
          endTime: now + 604800,
          inputAmountWei: (liquidity * 1_000_000).toString(),
          barValues: options.map(() => Math.floor(100 / options.length))
        };

        const res = await fetch('/api/build-create-market', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Failed to build transaction');
        }

        const txs = await res.json();
        status.innerHTML = `<p style="color:#667eea;">בבקשה אשר ${txs.length} טרנזקציות...</p>`;

        // Send transactions via MetaMask
        for (let i = 0; i < txs.length; i++) {
          const tx = txs[i];
          const txHash = await window.ethereum.request({
            method: 'eth_sendTransaction',
            params: [{
              from: currentAccount,
              to: tx.to,
              data: tx.data,
              value: tx.value || '0x0'
            }]
          });

          status.innerHTML += `<p style="color:#2ecc71;">✅ טרנזקציה ${i + 1} נשלחה: ${txHash.slice(0, 10)}...</p>`;
          
          // Wait for confirmation
          await new Promise(resolve => setTimeout(resolve, 3000));
        }

        status.innerHTML = `
          <div class="success">
            <p><strong>🎉 Market נוצר בהצלחה!</strong></p>
            <p>הטרנזקציות נשלחו ל-blockchain.</p>
            <p>ייתכן שייקח כמה דקות עד שה-Market יופיע ברשימה.</p>
          </div>
        `;

        // Reload markets after 10 seconds
        setTimeout(loadMarkets, 10000);
      } catch (err) {
        console.error('Create market error:', err);
        status.innerHTML = `<div class="error">${err.message}</div>`;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
